# Alembic Configuration File
# Документация: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Путь к директории с миграциями (относительно расположения этого файла)
script_location = alembic

# Шаблон имени файла миграции: <timestamp>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Кодировка исходников
source_encoding = utf-8

# DATABASE_URL берётся из env.py через settings, а не отсюда.
# Оставляем пустым — это предотвращает случайное использование дефолта.
sqlalchemy.url =

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
