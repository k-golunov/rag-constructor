# Полный стек RAG-конструктора одной командой:  docker compose up --build
#
# Сервисы:
#   postgres  — БД проекта (миграции применяются автоматически при старте backend)
#   qdrant    — векторное хранилище
#   redis     — брокер/бэкенд Celery
#   backend   — FastAPI (uvicorn) на :8000
#   worker    — Celery-воркер для фоновой обработки архивов
#   frontend  — Angular + nginx на :4200 (проксирует /api на backend)

x-backend-env: &backend-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: rag_constructor
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_constructor
  QDRANT_URL: http://qdrant:6333
  REDIS_URL: redis://redis:6379/0
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  UPLOAD_DIR: /app/uploads

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_constructor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_constructor"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *backend-env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.worker.celery_app worker --loglevel=info
    environment: *backend-env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_storage:
  uploads:
